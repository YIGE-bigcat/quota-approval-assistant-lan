<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#07100e">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css?v=12">
    <title>Codex 审批助手</title>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LIVE BRIDGE</p>
          <h1>Codex 审批</h1>
        </div>
        <div class="top-actions">
          <button class="floating-trigger" id="floating-settings" type="button">悬浮窗</button>
          <button class="install-app" id="install-app" type="button" hidden>安装</button>
          <div class="status-dot" id="connection" title="连接状态"></div>
        </div>
      </header>

      <section class="hero-card">
        <div class="quota-copy">
          <p class="label">额度概览</p>
          <h2 id="quota-state">读取中</h2>
          <p id="quota-updated">等待 Codex 返回最新额度数据</p>
        </div>
        <div class="quota-pair">
          <article class="quota-card quota-card-short" id="short-card">
            <div class="quota-card-head">
              <span>5 小时额度</span>
            </div>
            <div class="quota-value" id="short-remaining"><b>--</b><em>剩余</em></div>
            <div class="battery battery-short" aria-hidden="true">
              <div class="battery-glass">
                <div class="battery-liquid"><i></i></div>
              </div>
              <div class="battery-tip"></div>
            </div>
            <div class="quota-reset" id="short-reset">--</div>
          </article>
          <article class="quota-card quota-card-weekly" id="weekly-card">
            <div class="quota-card-head">
              <span>本周额度</span>
            </div>
            <div class="quota-value" id="weekly-remaining"><b>--</b><em>剩余</em></div>
            <div class="battery battery-weekly" aria-hidden="true">
              <div class="battery-glass">
                <div class="battery-liquid"><i></i></div>
              </div>
              <div class="battery-tip"></div>
            </div>
            <div class="quota-reset" id="weekly-reset">--</div>
          </article>
        </div>
      </section>

      <section class="section-block">
        <div class="section-heading">
          <div>
            <p class="eyebrow">ACTION REQUIRED</p>
            <h2>权限审核</h2>
          </div>
          <span class="count" id="approval-count">0</span>
        </div>
        <div id="approvals" class="stack empty-state">暂无待审核请求</div>
      </section>

      <section class="section-block">
        <div class="section-heading">
          <div>
            <p class="eyebrow">RECENT</p>
            <h2>审批历史</h2>
          </div>
          <button class="refresh" id="refresh" type="button">刷新</button>
        </div>
        <div id="events" class="timeline empty-state">暂无审批历史</div>
      </section>
    </main>
    <dialog class="floating-dialog" id="floating-dialog" aria-labelledby="floating-dialog-title">
      <form method="dialog" class="floating-dialog-card">
        <div class="floating-dialog-head">
          <div>
            <p class="eyebrow">DESKTOP WIDGET</p>
            <h2 id="floating-dialog-title">额度悬浮窗</h2>
          </div>
          <button class="dialog-close" id="floating-close" type="submit" aria-label="关闭设置">×</button>
        </div>
        <p class="floating-dialog-copy">在桌面最上层显示当前额度。Windows 电脑会使用无边框沉浸式小工具，其余环境自动使用浏览器兼容模式。</p>
        <p class="floating-support" id="floating-support"></p>
        <div class="setting-list">
          <label class="setting-row setting-row-primary" for="floating-enabled">
            <span><strong>开启桌面悬浮窗</strong><small>显示独立的置顶额度小窗</small></span>
            <input id="floating-enabled" type="checkbox" role="switch">
          </label>
          <label class="setting-row" for="floating-short">
            <span><strong>显示 5 小时额度</strong><small>短期剩余额度</small></span>
            <input id="floating-short" type="checkbox" role="switch">
          </label>
          <label class="setting-row" for="floating-weekly">
            <span><strong>显示本周额度</strong><small>7 天滚动窗口剩余额度</small></span>
            <input id="floating-weekly" type="checkbox" role="switch">
          </label>
          <label class="setting-row setting-select" for="floating-density">
            <span><strong>悬浮窗布局</strong><small>紧凑模式更适合屏幕边角</small></span>
            <select id="floating-density">
              <option value="comfortable">标准</option>
              <option value="compact">紧凑</option>
            </select>
          </label>
        </div>
        <p class="floating-tip">悬浮窗可以拖到屏幕任何位置，原生窗口右上角可直接关闭。</p>
      </form>
    </dialog>
    <template id="approval-template">
      <article class="approval-card">
        <div class="approval-head">
          <span class="tool-name"></span>
          <span class="expires"></span>
        </div>
        <p class="reason"></p>
        <code class="target"></code>
        <p class="weekly-quota"></p>
        <div class="actions">
          <button class="deny" type="button">拒绝</button>
          <button class="allow" type="button">批准</button>
        </div>
      </article>
    </template>
    <script type="module" src="/app.js?v=12"></script>
  </body>
</html>
